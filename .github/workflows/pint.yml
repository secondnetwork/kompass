name: Pint

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**.php'
      - composer.json
      - composer.lock
      - .github/workflows/pint.yml

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-pint-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-pint-

      - name: Install Pint
        run: composer global require laravel/pint --no-interaction --no-progress

      - name: Run Pint
        run: ~/.composer/vendor/bin/pint

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: apply Pint formatting'
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
